[build]
  command = "npm install && npm install -g netlify-cli"
  functions = "backend"
  publish = "backend/user interface"

[dev]
  command = "cd backend && npm install && node server.js"
  port = 5000

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
