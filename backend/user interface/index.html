<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://kit.fontawesome.com/4d39e4a0f3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solid ai dashboard</title>
</head>
<body>
    <div class="container">


        <!-- SECTION1 -->
<header class="header">
    
    <nav class="menu">

 <!-- PROFILE SECTION -->

      <div class="profile_section">
        <div class="set1">
        
        <div class="profile_img">
        <img src="https://www.simplilearn.com/ice9/free_resources_article_thumb/how_to_become_A_programmer.jpg" alt="Profile Picture" class="profile_picture">
      <div class="active_logo">

   </div>
        </div>

      <div class="text">
  <span class="profile_name">Augustine Michael</span>
  <div class="state">Online</div>
      </div>

      <div class="arrow_down">
        <i class="fa-solid fa-angle-down"></i>
    </div>
</div>


    <div class="closebtns">
        <i class="fa-solid fa-xmark"></i>
    </div>


        </div>



      <!-- LIST-SECTION -->
 
      <div class="list_section">
       <li class="ls home">
        <div class="home_logo">
            <i class="fa-regular fa-house" id="list-logo"></i>
        </div>
        <a href="#">Home</a>
       </li>

       <li class=" ls my-task">
        <div class="task_logo">
            <i class="fa-solid fa-list-check" id="list-logo"></i>
        </div>
        <a href="#">My Task</a>
       </li>

       <li class="ls settings">
        <div class="settings_logo">
            <i class="fa-solid fa-gear" id="list-logo"></i>
        </div>
        <a href="#">Settings</a>
        <div class="drop_settings">
            <div class="settings_lists">
                <li class="item theme">
                    <div class="St text">Theme</div>
                    <div class="toggle">
                        <button class=" togglebtn dark"></button>
                        <button class="togglebtn light"></button>
                    </div>
                </li>

                <li class="item logout">
                    <div class="St text">Logout</div>
                    <div class="toggle">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </div>
                </li>
     
       </li>
     </div>


<!-- PROJECT SECTION -->

      <div class="project_section">
<div class="my_projects">My Projects</div>
    <div class="all_projects">
        <li class="projects">Economics</li>
        <li class="projects">Critical Thinking</li>
        <li class="projects">Web Development</li>
        <li class="projects">Data Science</li>
        <li class="projects">Biology</li>
        <li class="projects">Physics
        </li>
    </div>

      </div>
      
 <!-- PREMIUM -->
      <div class="premium">
        <div class="premium_logo">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" alt="Premium Logo" class="premium_img">
        </div>
        <div class="premium_text">Go Premium</div>
      </div>
    
      
    </nav>
</header>


<!-- SECTION2 -->

<div class="main_section">
    <div class="hamburger">
        <i class="fa-solid fa-bars"></i>
    </div>
     <div class="chat_area">
        <div class="greetings">
            Hello <span class="name">michael</span> , How are you doing?
        </div>
<div class="ai_response"></div>
<div class="user_response"></div>
</div>

     <div class="chat_box">
        <div class="set">
                   <div class="pin_logo">
        <i class="fa-solid fa-plus"></i>
       </div>

       <div class="input">
        <input type="text" placeholder="message...">
       </div>
        </div>


       <button class="send">
        <i class="fa-solid fa-arrow-up"></i>
       </button>

     </div>
    </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
